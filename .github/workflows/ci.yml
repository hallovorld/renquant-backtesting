name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: renquant-backtesting
      - uses: actions/checkout@v4
        with:
          repository: hallovorld/renquant-common
          path: renquant-common
      - uses: actions/checkout@v4
        with:
          repository: hallovorld/renquant-base-data
          path: renquant-base-data
      - uses: actions/checkout@v4
        with:
          repository: hallovorld/renquant-artifacts
          path: renquant-artifacts
      - uses: actions/checkout@v4
        with:
          repository: hallovorld/renquant-pipeline
          path: renquant-pipeline
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test tools
        run: python -m pip install -e renquant-common -e renquant-base-data -e renquant-artifacts -e renquant-pipeline -e renquant-backtesting pytest
      - name: Test
        working-directory: renquant-backtesting
        run: make test
